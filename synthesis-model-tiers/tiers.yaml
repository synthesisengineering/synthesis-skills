# tiers.yaml — canonical cross-provider model-tier resolution table.
#
# This file answers ONE question: "which model plays which ROLE right now?"
# It is deliberately NOT a capability catalog (context windows, pricing,
# thinking modes) — each product keeps its own catalog (e.g. Ragbot's
# engines.yaml). Consumers — skills, project docs, agent memory, humans
# switching models in a client UI — reference the ROLE LABELS and resolve
# them here.
#
# Roles (three, deliberately fewer than some vendors' ladders). The labels
# name the WORK, not the model — vendors name artifacts; work categories
# are the thing that stays stable across vendor ladder changes:
#   judgment — judgment calls, novel patterns, skill/script authorship,
#              cross-system changes, anything where being wrong is expensive
#   routine  — routine rule-following execution (daily sweeps, mechanical
#              runs, well-templated work)
#   bulk     — high-volume, low-stakes work (classification at scale,
#              summarization drips)
#
# Naming history: v1.x used frontier/efficient/light. Renamed 2026-07-14
# because the industry uses "frontier" to mean the whole current generation
# (OpenAI applies it to all three GPT-5.6 models), colliding with our
# top-rung meaning. Full rationale: references/naming-rationale.md.
#
# Per role and provider, the role key holds an ORDERED PREFERENCE LIST:
# the first entry is preferred; later entries are supported fallbacks
# (cost, availability). A provider whose ladder has fewer rungs than
# another's simply lists one model per role; a provider with more rungs
# expresses the extras as ordered fallbacks. When a vendor merges two
# rungs, the list shrinks — no schema change.
#
# Product catalogs (e.g. Ragbot's engines.yaml) use the SAME tier
# vocabulary in a per-model `tier:` field. A catalog may carry more
# models than the role lists bless (local models kept for bigger
# hardware); the reverse — a model listed here but absent from the
# catalog, or listed under a different role than its catalog tier —
# is drift, and Ragbot's tests/test_engines_yaml.py fails on it.
#
# Update protocol: verify identifiers against the provider's official docs
# BEFORE editing (never from an agent's training data); record the
# verification date per provider; unknown means the literal string
# "unknown", never a guess.

version: 2
updated: "2026-07-14"

providers:
  anthropic:
    verified: "2026-07-14"           # https://platform.claude.com/docs/en/docs/about-claude/models/overview
    judgment: [claude-fable-5, claude-opus-4-8]   # prefer Fable; Opus is the cost-conscious judgment fallback
    routine: [claude-sonnet-5]
    bulk: [claude-haiku-4-5-20251001]             # alias claude-haiku-4-5
  openai:
    verified: "2026-07-14"           # https://developers.openai.com/api/docs/models
    judgment: [gpt-5.6-sol]
    routine: [gpt-5.6-terra]
    bulk: [gpt-5.6-luna]
  google:
    verified: "2026-04-24"           # carried from the April engines.yaml snapshot; refresh before relying on it
    judgment: [gemini/gemini-3.1-pro-preview]
    routine: [gemini/gemini-3-flash-preview]
    bulk: [gemini/gemini-3.1-flash-lite-preview]
  ollama:
    # Local models. Ids are Ollama tags (as configured in the product
    # catalog). Role resolution for local models is hardware-gated: these
    # lists carry only models that fit a single Apple-Silicon laptop.
    # Mac-Studio-class MoEs (deepseek-v3.2:671b, mistral-large-3:675b,
    # llama4:maverick) stay catalog-only until such hardware exists here.
    verified: "2026-07-14"           # against Ragbot engines.yaml (v3.4 open-weights set)
    judgment: [qwen3.6:35b-a3b, gemma4:31b]   # coding-optimized MoE flagship first; dense Gemma as quality fallback
    routine: [gemma4:26b, qwen3.6:27b]
    bulk: [gemma4:e4b]

# Client-selector strings, ONLY where they differ from the provider API id.
# Claude Code's /model command takes the API ids verbatim (verified live
# 2026-07-14: `/model claude-sonnet-5`, `/model claude-fable-5`).
clients: {}
